<!DOCTYPE html>
<html>
<head>
  <title>Hotel Booking Form</title>

  <style>
    form {
      width: 350px;
      margin: auto;
      padding: 20px;
      background: white;
      border: 2px solid gray;
    }
    input, select {
      width: 100%;
      padding: 8px;
      margin: 8px 0;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: blue;
      color: white;
      border: none;
    }
    .error {
      color: red;
      font-size: 14px;
    }
  </style>

  <script>
    function validateForm() {

      let name = document.getElementById("name").value;
      let email = document.getElementById("email").value;
      let mobile = document.getElementById("mobile").value;
      let checkin = document.getElementById("checkin").value;
      let checkout = document.getElementById("checkout").value;
      let guests = document.getElementById("guests").value;
      let room = document.getElementById("room").value;

      // Clear previous errors
      document.getElementById("error").innerHTML = "";

      // 1. Full Name Validation
      if (name === "") {
        document.getElementById("error").innerHTML = "Name must not be empty";
        return false;
      }
      if (!isNaN(name)) {
        document.getElementById("error").innerHTML = "Name should contain only alphabets";
        return false;
      }

      // 2. Email Validation (simple format check)
      if (email === "" || !email.includes("@") || !email.includes(".")) {
        document.getElementById("error").innerHTML = "Enter a valid email address";
        return false;
      }

      // 3. Mobile Number Validation
      if (mobile.length != 10 || isNaN(mobile)) {
        document.getElementById("error").innerHTML = "Mobile number must be exactly 10 digits";
        return false;
      }

      // 4. Check-in Date Validation (simple)
      if (checkin === "") {
        document.getElementById("error").innerHTML = "Please select check-in date";
        return false;
      }

    // 5. Check-out Date Validation (simple)
      if (checkout === "") {
        document.getElementById("error").innerHTML = "Please select check-out date";
        return false;
      }

    // Check-out must be after check-in
      if (checkout <= checkin) {
        document.getElementById("error").innerHTML = "Check-out date must be after check-in date";
        return false;
      }

      // 6. Number of Guests Validation
      if (guests <= 0 || guests > 6) {
        document.getElementById("error").innerHTML = "Guests must be between 1 and 6";
        return false;
      }

      // 7. Room Type Validation
      if (room === "Select") {
        document.getElementById("error").innerHTML = "Please select a room type";
        return false;
      }

      // If all valid
      alert("Booking Successful");
      return true;
    }
  </script>
</head>

<body>

<form onsubmit="return validateForm()">
  <h2>Hotel Booking Form</h2>

  <label>Full Name:</label>
  <input type="text" id="name" placeholder="Enter Full Name">

  <label>Email Address:</label>
  <input type="text" id="email" placeholder="Enter Email">

  <label>Mobile Number:</label>
  <input type="text" id="mobile" placeholder="Enter 10-digit Mobile">

  <label>Check-in Date:</label>
  <input type="date" id="checkin">

  <label>Check-out Date:</label>
  <input type="date" id="checkout">

  <label>Number of Guests:</label>
  <input type="number" id="guests" min="1" max="6">

  <label>Room Type:</label>
  <select id="room">
    <option>Select</option>
    <option>Single</option>
    <option>Double</option>
    <option>Suite</option>
  </select>

  <p id="error" class="error"></p>

  <button type="submit">Book Now</button>
</form>

</body>
</html>
