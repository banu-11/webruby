<!DOCTYPE html>
<html>
<head>
  <title>Restaurant Order</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      margin-top: 40px;
    }

    form {
      background: white;
      padding: 25px;
      width: 360px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 { text-align: center; }

    label {
      font-weight: bold;
      display: block;
      margin-top: 10px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 6px 0;
    }

    input[type="text"], textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
    }

    button {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 5px;
    }

    .error { color: red; }
    .success { color: green; }

  </style>
</head>

<body>

<form onsubmit="return submitForm()">

  <h2>Restaurant Order</h2>

  <!-- Name -->
  <label>Customer Name:</label>
  <input type="text" id="name">

  <!-- Menu -->
  <label>Menu Items:</label>
  <div class="item"><input type="checkbox" value="100"> Burger (₹100)</div>
  <div class="item"><input type="checkbox" value="150"> Pizza (₹150)</div>
  <div class="item"><input type="checkbox" value="80"> Sandwich (₹80)</div>
  <div class="item"><input type="checkbox" value="50"> Juice (₹50)</div>

  <p><b>Total: ₹<span id="total">0</span></b></p>

  <!-- Order Type -->
  <label>Order Type:</label>
  <div class="item"><input type="radio" name="type" value="Delivery"> Delivery</div>
  <div class="item"><input type="radio" name="type" value="Pickup"> Pickup</div>

  <!-- Address (Conditional) -->
  <div id="addressBox" style="display:none;">
    <label>Address:</label>
    <textarea id="address"></textarea>
  </div>

  <button type="submit">Place Order</button>
  <button type="reset">Reset</button>

  <p id="msg"></p>

</form>

<script>
  let checkboxes = document.querySelectorAll("input[type=checkbox]");
  let radios = document.querySelectorAll("input[name=type]");

  checkboxes.forEach(cb => cb.addEventListener("change", calc));

  radios.forEach(r => r.addEventListener("change", () => {
    toggleAddress(r.value);
  }));

  function calc() {
    let total = 0;
    checkboxes.forEach(cb => {
      if (cb.checked) total += parseInt(cb.value);
    });
    document.getElementById("total").innerText = total;
  }

  function toggleAddress(type) {
    document.getElementById("addressBox").style.display =
      (type === "Delivery") ? "block" : "none";
  }

  function submitForm() {
    let msg = document.getElementById("msg");
    msg.innerHTML = "";

    let name = document.getElementById("name").value.trim();
    let total = document.getElementById("total").innerText;

    if (name.length < 2) {
      msg.innerHTML = "Enter valid name";
      msg.className = "error";
      return false;
    }

    let items = document.querySelectorAll("input[type=checkbox]:checked");
    if (items.length == 0) {
      msg.innerHTML = "Select at least one item";
      msg.className = "error";
      return false;
    }

    let type = document.querySelector("input[name=type]:checked");
    if (!type) {
      msg.innerHTML = "Select order type";
      msg.className = "error";
      return false;
    }

    if (type.value === "Delivery") {
      let address = document.getElementById("address").value.trim();
      if (address.length < 5) {
        msg.innerHTML = "Enter valid address";
        msg.className = "error";
        return false;
      }
    }

    // AJAX Simulation
    setTimeout(() => {
      if (Math.random() > 0.2) {
        msg.innerHTML = "Order Placed! Total: ₹" + total;
        msg.className = "success";
      } else {
        msg.innerHTML = "Order Failed!";
        msg.className = "error";
      }
    }, 800);

    return false;
  }
</script>

</body>
</html>
