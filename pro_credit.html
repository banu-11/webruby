<!DOCTYPE html>
<html>
<head>
  <title>Product Payment</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      margin-top: 40px;
    }

    form {
      background: white;
      padding: 25px;
      width: 350px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2, h3 {
      margin-bottom: 10px;
    }

    /* FIXED ALIGNMENT */
    .item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 8px 0;
    }

    .item input {
      width: auto;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 10px;
    }

    input[type="text"],
    input[type="month"] {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
    }

    button {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 5px;
    }

    .error { color: red; }
    .success { color: green; }

  </style>
</head>

<body>

<form onsubmit="return submitForm()">

  <h2>Products</h2>

  <div class="item">
    <input type="checkbox" value="100"> <span>Product A (₹100)</span>
  </div>

  <div class="item">
    <input type="checkbox" value="200"> <span>Product B (₹200)</span>
  </div>

  <div class="item">
    <input type="checkbox" value="300"> <span>Product C (₹300)</span>
  </div>

  <p><b>Total: ₹<span id="total">0</span></b></p>

  <h3>Payment (Credit Card)</h3>

  <label>Card Number:</label>
  <input type="text" id="card" placeholder="16 digits">

  <label>Expiry Date:</label>
  <input type="month" id="expiry">

  <button type="submit">Pay Now</button>

  <p id="msg"></p>

</form>

<script>
  let checkboxes = document.querySelectorAll("input[type=checkbox]");

  checkboxes.forEach(cb => cb.addEventListener("change", calc));

  function calc() {
    let total = 0;
    checkboxes.forEach(cb => {
      if (cb.checked) total += parseInt(cb.value);
    });
    document.getElementById("total").innerText = total;
  }

  function submitForm() {
    let msg = document.getElementById("msg");
    msg.innerHTML = "";

    let total = document.getElementById("total").innerText;
    let card = document.getElementById("card").value;
    let expiry = document.getElementById("expiry").value;

    if (total == 0) {
      msg.innerHTML = "Select at least one product";
      msg.className = "error";
      return false;
    }

    if (card.length != 16 || isNaN(card)) {
      msg.innerHTML = "Enter valid 16-digit card number";
      msg.className = "error";
      return false;
    }

    if (expiry == "") {
      msg.innerHTML = "Select expiry date";
      msg.className = "error";
      return false;
    }

    // Simple AJAX simulation
    setTimeout(() => {
      msg.innerHTML = "Payment Successful!";
      msg.className = "success";
    }, 500);

    return false;
  }
</script>

</body>
</html>
